<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>도서 서가 정리 도우미</title>
  <link rel="icon" href="data:,">
  <link rel="manifest" href="manifest.webmanifest">
  <style>
    :root { color-scheme: light; --green:#00643f; --green2:#0b8a57; --ink:#17211d; --muted:#65736d; --line:#dfe7e3; --soft:#f4f8f6; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; color:var(--ink); background:#f7faf8; }
    header { position:sticky; top:0; z-index:2; background:linear-gradient(135deg,#004b32,#007d51); color:white; padding:18px clamp(16px,4vw,48px); box-shadow:0 8px 24px #00351f22; }
    header h1 { margin:0; font-size:clamp(24px,4vw,38px); letter-spacing:0; }
    header p { margin:6px 0 0; color:#d8eee5; }
    main { width:min(1040px,100%); margin:0 auto; padding:20px clamp(12px,3vw,24px) 40px; display:grid; gap:16px; }
    section { background:white; border:1px solid var(--line); border-radius:8px; padding:18px; box-shadow:0 10px 30px #153b2710; }
    h2 { margin:0 0 14px; font-size:20px; }
    label { display:grid; gap:7px; font-weight:700; }
    input { width:100%; border:1px solid #b9c8c1; border-radius:7px; padding:13px 12px; font:inherit; background:white; }
    button, .fileButton { border:1px solid var(--green); border-radius:7px; padding:12px 14px; font:700 15px/1 system-ui; background:white; color:var(--green); cursor:pointer; white-space:nowrap; }
    button.primary, .fileButton { background:var(--green); color:white; }
    button.selected { background:#dff3ea; }
    .grid { display:grid; grid-template-columns: 220px 1fr; gap:16px; align-items:start; }
    .actions { display:flex; gap:10px; flex-wrap:wrap; margin-top:12px; }
    .candidates { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
    #photoInput { position:absolute; inline-size:1px; block-size:1px; opacity:0; }
    #preview { width:100%; aspect-ratio:3/4; object-fit:cover; border-radius:8px; border:1px solid var(--line); }
    .hint { color:var(--muted); font-size:14px; margin:9px 0 0; }
    .result { display:grid; grid-template-columns:repeat(auto-fit, minmax(180px, 1fr)); gap:12px; margin-top:14px; }
    .metric { background:var(--soft); border:1px solid var(--line); border-radius:8px; padding:12px; }
    .metric span { display:block; color:var(--muted); font-size:13px; margin-bottom:4px; }
    .mapWrap { position:relative; aspect-ratio:1010/1218; border:1px solid #ccd8d2; border-radius:8px; background:white url("shelf-map.bmp") center / contain no-repeat; overflow:hidden; max-height:680px; }
    .routeLayer { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; z-index:2; }
    .routeLayer polyline { fill:none; stroke:#0b8a57; stroke-width:2.2; stroke-linecap:round; stroke-dasharray:5 4; filter:drop-shadow(0 1px 2px white); }
    .routeMarker { stroke:white; stroke-width:1; filter:drop-shadow(0 1px 2px #0005); }
    .routeStart { fill:#2563eb; }
    .routeEnd { fill:#e11d48; }
    .shelf { position:absolute; z-index:1; display:grid; place-items:center; border:2px solid #0b8a57aa; border-radius:7px; background:transparent; color:var(--green); padding:0; pointer-events:none; font-weight:800; font-size:13px; opacity:.9; text-shadow:0 1px 2px white; }
    .shelf.active { z-index:3; border-color:#fff; background:var(--green2); opacity:1; box-shadow:0 0 0 999px #00643f12, 0 0 0 4px #0b8a5755; transform:scale(1.08); }
    ol { margin:0; padding:0; list-style:none; display:grid; gap:8px; }
    li { border:1px solid var(--line); border-radius:8px; padding:12px; display:grid; gap:4px; background:white; }
    li span { color:var(--muted); }
    li.warn { border-color:#e9b45a; background:#fff8ec; }
    .empty { color:var(--muted); }
    footer { color:var(--muted); text-align:center; padding:0 0 26px; font-size:13px; }
    @media (max-width:720px) {
      .grid, .result { grid-template-columns:1fr; }
      section { padding:15px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>도서 서가 정리 도우미</h1>
    <p>촬영 이미지는 서버로 전송하지 않고, 청구기호 확인과 서가 정렬만 처리합니다.</p>
  </header>
  <main>
    <section>
      <h2>입력</h2>
      <div class="grid">
        <div>
          <label class="fileButton" for="photoInput">카메라 촬영 / 사진 선택</label>
          <input id="photoInput" type="file" accept="image/*" capture="environment">
          <img id="preview" alt="선택한 라벨 미리보기" hidden>
          <p class="hint" id="status">기기 OCR이 지원되지 않으면 직접 입력으로 진행합니다.</p>
        </div>
        <div>
          <label>도서명 <input id="titleInput" placeholder="예: 그리스 로마 신화"></label>
          <label style="margin-top:12px">확인한 청구기호 <input id="callInput" placeholder="예: 아동 219.2-2020-1-9" inputmode="text"></label>
          <div class="actions">
            <button class="primary" id="addBook">정리 목록에 추가</button>
            <button id="sampleBook">예시 입력</button>
            <button id="clearBooks">목록 비우기</button>
          </div>
        </div>
      </div>
      <div class="result">
        <div class="metric"><span>파싱 결과</span><strong id="parsed"></strong></div>
        <div class="metric"><span>서가 안내</span><strong id="result"></strong></div>
        <div class="metric"><span>추천 경로</span><strong id="route"></strong></div>
      </div>
      <div class="candidates" id="candidates" aria-label="후보 서가"></div>
    </section>
    <section>
      <h2>배치도</h2>
      <div class="mapWrap" id="shelfMap" aria-label="서가 배치도"></div>
      <p class="hint">초기 데이터는 현장 조사값으로 교체하세요. 현재는 샘플 범위입니다.</p>
    </section>
    <section>
      <h2>정리 순서</h2>
      <ol id="bookList"></ol>
    </section>
    <section>
      <h2>현장 테스트</h2>
      <div class="result">
        <div class="metric"><span>OCR 검증</span><strong id="ocrStats"></strong></div>
        <div class="metric"><span>성공 기준</span><strong>서가 95% · 시간 30% 단축 · 외부 전송 없음</strong></div>
        <div class="metric"><span>데이터 상태</span><strong id="dataStatus"></strong></div>
      </div>
    </section>
  </main>
  <footer>CSV 인터페이스와 순수 로직은 app.js에 포함되어 있습니다.</footer>
  <script src="app.js"></script>
  <script>LibraryShelfHelper.initApp();</script>
</body>
</html>
